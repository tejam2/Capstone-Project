<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account – GCInsights V2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #5aa8b0, #276973);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 750px;
      background: white;
      border-radius: 10px;
      padding: 30px 35px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      font-family: 'Merriweather', serif;
      font-weight: 700;
      color: #1890ff;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .flash-messages {
      text-align: center;
      font-size: 13px;
      color: red;
      margin-bottom: 10px;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 30px;
      justify-content: space-between;
    }

    .form-group {
      flex: 1 1 45%;
    }

    .form-group-full {
      flex: 1 1 100%;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 90%;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #1890ff;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .link {
      text-align: center;
      font-size: 13px;
    }

    .link a {
      color: #1890ff;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .separator {
      text-align: center;
      margin: 15px 0;
      position: relative;
      font-size: 13px;
      color: #888;
    }

    .separator::before,
    .separator::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ccc;
    }

    .separator::before {
      left: 0;
    }

    .separator::after {
      right: 0;
    }

    .social-login {
      text-align: center;
      margin-top: 10px;
    }

    .social-login img {
      height: 28px;
      width: 28px;
      margin: 0 10px;
      object-fit: contain;
      transition: transform 0.2s;
    }

    .social-login img:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>CREATE ACCOUNT</h2>

    <!-- ✅ Flash Message Display -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          <ul style="list-style-type: none; padding-left: 0;">
            {% for category, message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/signup">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" name="email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role" required>
          <option value="">-- Select Role --</option>
          <option value="researcher">Researcher</option>
          <option value="analyst">Analyst</option>
          <option value="educator">Educator</option>
          <option value="student">Student</option>
        </select>
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" name="state" />
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" />
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" name="country" />
      </div>

      <div class="form-group-full">
        <button type="submit">Sign Up</button>
      </div>

      <div class="form-group-full link">
        <a href="/login">Already have an account? Login</a>
      </div>

           
    </form>
  </div>
</body>
</html>
